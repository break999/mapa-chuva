<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Olha a Chuva</title>
  <link rel="manifest" href="manifest.json">
  <script>navigator.serviceWorker?.register('sw.js')</script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body,html{height:100%;font-family:sans-serif;background:#000;overflow:hidden}
    #w{position:relative;width:100%;height:calc(100vh - 48px)}
    .m{position:absolute;inset:0;z-index:0;pointer-events:none}
    .m.a{z-index:1;pointer-events:auto}
    nav{height:48px;background:#1a1a1a;display:flex;border-top:1px solid #333}
    button{flex:1;border:none;background:none;color:#888;font-size:18px;cursor:pointer}
    button.a{color:#00aaff;border-top:3px solid #00aaff;background:#252525}
    .c{position:absolute;bottom:10px;right:10px;background:rgba(255,255,255,.7);padding:2px 5px;font-size:10px;border-radius:3px;text-decoration:none;color:#000}
    iframe{width:100%;height:100%;border:none}
  </style>
</head>
<body>
<div id="w">
  <div id="d" class="m a"><iframe src="https://www.cptec.inpe.br/dsat/?product=night_microphysics&product_opacity=1&zoom=4&x=3805.5131&y=4126.9628&overlay=convective_storm&overlay_opacity=1&animate=true&t=250.00&options=false"></iframe></div>
  <div id="r" class="m"><iframe src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=mm&metricTemp=°C&metricWind=bft&zoom=5&overlay=radar&product=radar&level=surface&lat=-27.6&lon=-51.6&message=true"></iframe></div>
  <div id="b" class="m"><iframe src="https://www.meteoblue.com/pt/tempo/mapas/widget/-27.6N-51.6E755_America%2FSao_Paulo?windAnimation=0&gust=0&satellite=0&cloudsAndPrecipitation=1&temperature=0&sunshine=0&extremeForecastIndex=0&geoloc=fixed&tempunit=C&lengthunit=metric&windunit=bft&zoom=4&autowidth=auto&user_key=a3e7dbaab04f15e8&embed_key=f8b96d8d51947f3d&sig=8b9098048acd8f51fd0fb03ec7430d4008ce0555ccd923a801f32c5594262e91" scrolling="no"></iframe><a href="https://www.meteoblue.com/pt/tempo/semana/index" target="_blank" class="c">meteoblue</a></div>
</div>
<nav>
  <button class="a" data-m="d">🛰️</button>
  <button data-m="r">📡</button>
  <button data-m="b">🗓️</button>
</nav>
<script>
  let am=document.getElementById('d'),ab=document.querySelector('button.a');
  document.querySelector('nav').addEventListener('click',e=>{
    const btn=e.target.closest('button');
    if(!btn||btn===ab)return;
    am.classList.remove('a');ab.classList.remove('a');
    am=document.getElementById(btn.dataset.m);ab=btn;
    am.classList.add('a');ab.classList.add('a');
  });
</script>
</body>
</html>
