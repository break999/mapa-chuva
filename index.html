    navigator.serviceWorker?.register('sw.js').catch(err =>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      height: 100%;
      font-family: sans-serif;
      background: #000;
      overflow: hidden;
    }
    #tooltip {
      display: none;
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      white-space: pre;
      pointer-events: none;
      z-index: 999;
    }
    #map-wrapper {
      position: relative;
      width: 100%;
      height: calc(100vh - 48px);
    }
    .map-container {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .map-container.active {
      z-index: 1;
      pointer-events: auto;
    }
    nav {
      height: 48px;
      background: #1a1a1a;
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top: 1px solid #333;
    }
    .tab-button {
      flex: 1;
      height: 100%;
      border: none;
      background: none;
      color: #888;
      font-size: 12px;
      cursor: pointer;
      transition: color .3s, background .3s;
      user-select: none;
      -webkit-user-select: none;
    }
    .tab-button.active {
      color: #00aaff;
      border-top: 3px solid #00aaff;
      background: #252525;
    }
    .credits {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(255,255,255,.7);
      padding: 2px 5px;
      font-size: 10px;
      border-radius: 3px;
      text-decoration: none;
      color: #000;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>

<body>

<nav id="tab-nav">
  <button class="tab-button active" data-map="dsat-am" data-tooltip="Vermelho: gradiente vertical de vapor d'água (baixo vapor d'água na camada superior com relação à camada inferior; intrusão de ar seco da estratosfera e ruptura da tropopausa)&#10Verde: baixo ozônio (alta tropopausa; ar quente)&#10Azul: vapor d'água na camada superior&#10O produto Airmass permite identificar a estrutura sinótica que governa o movimento e a criação de sistemas de chuva. Ele funciona monitorando a relação entre o gradiente vertical de vapor d'água e a altura da tropopausa. Quando ocorre uma redução na altura da tropopausa em conjunto com um gradiente onde o vapor d'água na camada superior é muito baixo em relação à inferior, identifica-se uma intrusão estratosférica ou ruptura de tropopausa. Esse processo físico indica que o ar seco e frio da alta atmosfera está forçando a subida do ar úmido abaixo, o que é o gatilho para a criação de novas chuvas ou a intensificação súbita de sistemas existentes.&#10Para prever se a chuva vai se mover ou ficar parada, o produto Airmass é essencial por atuar como um rastreador da dinâmica de larga escala da atmosfera, utilizando a distribuição do vapor d'água na camada superior como um traçador do campo de ventos. A movimentação de um sistema de chuva é ditada pelos ventos de direção, conhecidos como correntes de jato, que ocorrem nas zonas de transição entre massas de ar com diferentes alturas de tropopausa. Quando o fluxo de vapor na camada superior apresenta padrões alongados e gradientes térmicos e de umidade bem definidos, existe um momentum atmosférico que empurra as nuvens, indicando que a chuva passará rapidamente por uma região. Por outro lado, a estagnação ocorre quando esses padrões de vapor assumem formas circulares ou fechadas, como em centros de baixa pressão isolados, ou quando se observa a formação de bloqueios atmosféricos. Nesses bloqueios, uma massa de ar com tropopausa alta e ar seco atua como uma barreira física, impedindo o avanço dos sistemas de umidade e forçando a chuva a permanecer estacionária sobre a mesma coordenada geográfica por longos períodos. O monitoramento contínuo desse fluxo de vapor permite identificar se a energia da alta atmosfera está sustentando o deslocamento do sistema ou se a ausência de ventos de direção favoráveis resultará em um evento de precipitação persistente e acumulada no mesmo lugar.&#10Essa análise é complementada pela observação da inclinação estrutural do sistema atmosférico, que é determinada pela relação entre o transporte de umidade em diferentes altitudes. A inclinação física da nuvem ocorre quando o vetor de deslocamento do vapor d'água na camada inferior difere significativamente em direção ou velocidade do fluxo de vapor na camada superior, configurando o cisalhamento vertical. Esse processo é vital para a persistência da chuva, pois a inclinação separa a zona de entrada de ar úmido da zona de queda da precipitação, evitando que a própria chuva interrompa a corrente ascendente que alimenta a nuvem. Em situações de alta complexidade, como as chuvas que parecem paradas no mesmo lugar apesar de ventos fortes, ocorre uma dinâmica de regeneração contínua na borda de entrada da umidade. Enquanto as camadas superiores da nuvem são sopradas para longe pelos ventos de altitude, o fluxo constante de vapor d'água na camada inferior encontra barreiras térmicas ou dinâmicas e gera novas células de chuva exatamente na retaguarda do sistema original. Isso cria um ciclo onde a precipitação se renova incessantemente sobre a mesma coordenada geográfica, dando a realidade física de um sistema que se regenera mais rápido do que o vento consegue deslocá-lo. Esse mecanismo é o que sustenta chuvas intermitentes e pesadas que não se movem, sendo detectado pela persistência de altos índices de vapor nos níveis baixos em contraste com o movimento rápido observado no vapor da camada superior e na altura da tropopausa. Compreender essa inclinação permite prever se uma chuva vai se fragmentar em várias menores ou se novas chuvas vão surgir ao redor de uma já existente, pois a direção para a qual a nuvem se inclina indica onde novas células serão forçadas a subir.&#10Para o produto Airmass, a análise da estrutura sinótica ganha uma camada extra de complexidade devido ao papel da Serra como um gatilho mecânico. Quando uma intrusão de ar seco e frio de altos níveis se desloca de oeste para leste, a topografia catarinense atua como uma rampa que força a ascensão abrupta do ar úmido represado nos níveis baixos. Esse levantamento orográfico acelera a saturação da atmosfera e intensifica a redução da altura da tropopausa exatamente sobre o declive da serra, explicando por que chuvas que vêm do interior ganham força súbita antes de atingirem Florianópolis. No cenário oposto, quando se observam sistemas estacionários que se formam no mar, este produto revela se existe um bloqueio atmosférico no Atlântico Sul. Se os padrões de vapor na camada superior mostram um centro de alta pressão estagnado sobre o oceano, a umidade marítima é empurrada continuamente contra o litoral pela circulação de superfície, mas encontra uma barreira na massa de ar seco em altitude, resultando em chuvas persistentes e paradas que se alimentam da diferença térmica entre a água do mar e o continente.&#10O monitoramento da inclinação estrutural do sistema pelo fluxo de vapor torna-se decisivo para entender se a chuva vai vencer a serra ou se fragmentar. Se o transporte de vapor na camada inferior vem do leste, carregado de umidade oceânica, e o fluxo de vapor na camada superior vem do oeste, ocorre um forte cisalhamento vertical sobre o litoral de Santa Catarina. Esse choque de direções faz com que as nuvens se inclinem, permitindo que a chuva caia no oceano ou na planície costeira enquanto novas células continuam se formando no topo da serra. Esse mecanismo explica as chuvas intermitentes em que nuvens grossas parecem imóveis sobre a região da grande Florianópolis, pois enquanto o vento de altitude tenta empurrar o sistema para o mar, o vento de superfície continua reabastecendo a nuvem com umidade oceânica na retaguarda do sistema. A compreensão dessa inclinação permite prever se a chuva ficará travada na encosta da serra por horas ou se o momentum atmosférico mostrado no vapor superior é forte o suficiente para carregar todo o sistema de oeste para leste de forma rápida.">༄</button>
  <button class="tab-button" data-map="dsat-wv" data-tooltip="Vermelho: topo de nuvem frio&#10Verde: vapor d'água na camada superior&#10Azul: vapor d'água na camada inferior&#10O produto Simple Water Vapor foca na disponibilidade de combustível e na profundidade do sistema. Ele analisa o vapor d'água em diferentes camadas da troposfera e a temperatura do topo da nuvem. Uma chuva vai começar quando o vapor d'água na camada inferior é transportado para cima, saturando a camada superior. Se o topo da nuvem começa a esfriar rapidamente enquanto o vapor na camada inferior permanece alto, há um suprimento contínuo de umidade que garante a persistência da chuva. Em casos de chuvas intermitentes onde nuvens grossas pairam por horas, este produto ajuda a identificar se há uma pausa real ou apenas uma redução momentânea. Se o vapor d'água na camada inferior continua abundante, a nuvem permanece ativa e a chuva voltará em breve. Se o vapor na camada superior começa a se dissipar enquanto o topo da nuvem esquenta, o sistema está perdendo sua estrutura vertical e a chuva está chegando ao fim. Ele é o alicerce para os produtos de microfísica, pois define se há umidade suficiente para sustentar o crescimento das partículas.">💨</button>
  <button class="tab-button" data-map="dsat-cp" data-tooltip="Vermelho: gelo -> água&#10Verde: menor tamanho de partícula&#10Azul: espessura óptica da nuvem&#10O produto Cloud Phase EUMETSAT detalha a transição física que determina se a água dentro da nuvem está pronta para cair. Ele cruza a fase da nuvem com a espessura óptica e o tamanho da partícula. Em chuvas leves de nuvens menores ou nuvens baixas que pairam o dia todo, a regra do tamanho da partícula se inverte em relação às tempestades. Como não há gelo no topo dessas nuvens quentes, a chuva só começa quando o tamanho da partícula aumenta, indicando que as gotas se fundiram por colisão e coalescência até ficarem pesadas o suficiente para vencer a resistência do ar. Se a espessura óptica da nuvem é alta, mas o tamanho da partícula permanece pequeno, a nuvem está apenas retendo umidade e a chuva não cairá. O início de uma nova fase de chuva intermitente nessas nuvens é previsto pelo aumento gradual do tamanho das gotas no topo. Este produto deve ser lido em conjunto com o Night Microphysics para manter a vigilância quando a luz solar não está disponível para medir o tamanho da partícula por reflectância.&#10Este produto a ferramenta definitiva para prever o comportamento das nuvens baixas que pairam sobre Florianópolis e região. No contexto da costa catarinense, é frequente a formação de uma camada de nuvens estratiformes que ficam presas entre o mar e a serra. Para saber se essa nuvem grossa vai finalmente começar a chover de forma intermitente, deve-se monitorar o aumento do tamanho da partícula combinado com a estabilidade da espessura óptica. Como a serra impede que essas nuvens avancem para o oeste, elas permanecem estacionárias e o único gatilho para a chuva é a microfísica interna de colisão das gotas. Se o tamanho da partícula começa a crescer enquanto a nuvem está encostada na serra, a chuva é iminente. Este produto também permite identificar a criação de novas chuvas ao redor de uma já existente ao observar se a espessura óptica aumenta em áreas de mar aberto próximas à costa, indicando que a umidade marítima está se organizando em novas células antes mesmo de atingir o continente. Isso é crucial para prever se o tempo fechado terá breves pausas ou se novas faixas de chuva estão em linha de produção no oceano.">☁️</button>
  <button class="tab-button" data-map="dsat-dv" data-tooltip="Vermelho: gradiente vertical de vapor d'água (baixo vapor d'água na camada superior com relação à camada inferior)&#10Verde: menor tamanho de partícula&#10Azul: gelo -> água&#10O produto Day Convection é o principal indicador da intensidade e da fase de desenvolvimento da chuva durante o dia. A dinâmica aqui é baseada na velocidade das correntes ascendentes dentro da nuvem. Em sistemas de tempestade, a observação de um menor tamanho de partícula no topo da nuvem, em conjunto com a transição da fase de água para gelo, indica uma nuvem extremamente vigorosa onde as gotículas são levadas para cima tão rápido que congelam em cristais minúsculos antes de terem tempo de crescer. Isso sinaliza que a chuva vai se intensificar significativamente. Para prever o rompimento de uma chuva em várias menores ou a criação de novas células ao redor de uma antiga, deve-se observar se novas áreas com partículas pequenas e transição para gelo surgem nas bordas do sistema principal, indicando que frentes de rajada estão forçando o ar úmido vizinho a subir. Este produto depende do contexto térmico do Simple Water Vapor para diferenciar se a partícula pequena é sinal de força (em nuvens frias) ou apenas de uma nuvem jovem que ainda não começou a chover (em nuvens quentes).&#10Este produto ganha uma importância estratégica no litoral catarinense para diferenciar as tempestades continentais que descem a serra das instabilidades que nascem no oceano. Quando o sistema se move de oeste para leste, a topografia da Serra do Mar atua como um acelerador da velocidade das correntes ascendentes. Nesses casos, a observação de um menor tamanho de partícula no topo da nuvem exatamente sobre as cristas da serra indica que o levantamento orográfico está forçando a umidade a congelar de forma explosiva. Esse fenômeno sinaliza que a chuva chegará ao litoral e a Florianópolis com muito mais energia do que quando estava no interior do estado. Por outro lado, para as chuvas que se formam sobre o mar e avançam para a costa, este produto revela a saúde da célula marítima ao mostrar se a fase de gelo está presente mesmo em altitudes menores, o que é comum devido à alta umidade disponível. Se o sistema marítimo apresenta partículas pequenas e transição rápida para gelo enquanto ainda está sobre o Atlântico, a chuva será intensa ao tocar o continente, mas se o sistema apresenta apenas fase de água com partículas maiores, trata-se de uma chuva de circulação marítima mais leve e persistente, típica dos dias em que a serra segura a nebulosidade sobre a faixa leste.">⤴️</button>
  <button class="tab-button" data-map="dsat-nm" data-tooltip="Vermelho: espessura óptica da nuvem&#10Verde: gelo -> água&#10Azul: topo de nuvem quente&#10O produto Night Microphysics permite monitorar a dissipação e a espessura das nuvens durante a noite, focando na espessura óptica e na temperatura do topo. Ele é vital para entender o fim de uma chuva. Quando a espessura óptica da nuvem começa a diminuir e o topo da nuvem torna-se progressivamente mais quente, a nuvem está perdendo sua densidade e baixando sua altitude, o que indica que a precipitação está cessando. Em cenários de chuvas paradas no mesmo lugar, se a espessura óptica se mantém constante e o topo da nuvem permanece frio ou em fase de gelo, a chuva continuará ocorrendo sem pausa. Para chuvas leves e intermitentes, este produto revela se a camada de nuvens está se tornando rala o suficiente para permitir a passagem de radiação, sinalizando que a umidade está se dispersando.&#10Durante a noite, a diferença de temperatura entre a terra que esfria e o mar que permanece aquecido cria uma zona de convergência no litoral. Se o Night Microphysics mostrar que a espessura óptica dessas nuvens costeiras está aumentando e o topo permanece quente, trata-se da formação de uma chuva leve ou garoa que pode durar horas devido ao confinamento geográfico. O fim dessa chuva só pode ser previsto quando se observa, por meio da diferença vertical de vapor, que o ar seco do interior começou a avançar sobre a serra, empurrando a umidade marítima de volta para o oceano ou dissipando a camada de nuvens por evaporação. Essa interação entre a umidade do Atlântico e a barreira física da Serra Geral torna o monitoramento da espessura óptica e do combustível de baixos níveis a única forma segura de prever a duração desses eventos intermitentes que não possuem o topo frio das grandes tempestades.">🌙</button>
  <button class="tab-button" data-map="windy-sat" data-tooltip="Satélite Processado">🛩️</button>
  <button class="tab-button" data-map="windy-rad" data-tooltip="Radar Meteorológico">📡</button>
  <button class="tab-button" data-map="ventusky" data-tooltip="Radar Processado">🤖</button>
  <button class="tab-button" data-map="meteoblue" data-tooltip="Previsão do Tempo">🗓️</button>
</nav>
<script>
  const tooltip = document.getElementById('tooltip');
  const nav = document.getElementById('tab-nav');

  let activeMap = document.getElementById('dsat-am');
  let activeBtn = document.querySelector('.tab-button.active');

  // Troca de aba
  nav.addEventListener('click', e => {
    const btn = e.target.closest('.tab-button');
    if (!btn || btn === activeBtn) return;

    activeMap.classList.remove('active');
    activeBtn.classList.remove('active');

    activeMap = document.getElementById(btn.dataset.map);
    activeBtn = btn;

    activeMap.classList.add('active');
    activeBtn.classList.add('active');
  });

  // Tooltip com long-press (300ms)
  let pressTimer = null;

  nav.addEventListener('touchstart', e => {
    const btn = e.target.closest('.tab-button');
    if (!btn) return;

    pressTimer = setTimeout(() => {
      // Só chama preventDefault depois do delay,
      // então toques rápidos ainda disparam o click normalmente
      tooltip.textContent = btn.dataset.tooltip;
      tooltip.style.display = 'block';
      pressTimer = null;
    }, 300);
  }, { passive: true });

  const hideTooltip = () => {
    clearTimeout(pressTimer);
    pressTimer = null;
    tooltip.style.display = 'none';
  };

  nav.addEventListener('touchend', hideTooltip);
  nav.addEventListener('touchcancel', hideTooltip);
  nav.addEventListener('touchmove', hideTooltip);
</script>
</body>
</html>
