<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Olha a Chuva</title>
  <link rel="manifest" href="manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
    function switchMap(mapId) {
      document.querySelectorAll('.map-container').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
      document.getElementById(mapId).style.display = 'block';
      event.currentTarget.classList.add('active');
      const iframe = document.querySelector('#' + mapId + ' iframe[data-src]');
      if (iframe) {
        iframe.src = iframe.getAttribute('data-src');
        iframe.removeAttribute('data-src');
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { 
      height: 100%; 
      font-family: sans-serif;
      background-color: #000;
      overflow: hidden;
    }
    .map-container {
      width: 100%;
      height: calc(100vh - 60px);
      display: none;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    nav {
      height: 60px;
      background: #1a1a1a;
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top: 1px solid #333;
    }
    .tab-button {
      flex: 1;
      height: 100%;
      border: none;
      background: none;
      color: #888;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
    }
    .tab-button.active {
      color: #00aaff;
      border-top: 3px solid #00aaff;
      background: #252525;
    }
    .credits {
      position: absolute;
      bottom: 65px;
      right: 10px;
      background: rgba(255,255,255,0.7);
      padding: 2px 5px;
      font-size: 10px;
      border-radius: 3px;
      text-decoration: none;
      color: #000;
    }
  </style>
</head>
<body>
  <div id="dsat" class="map-container" style="display: block;">
    <iframe src="https://www.cptec.inpe.br/dsat/?product=airmass&product_opacity=1&zoom=5&x=3899.4427&y=4095.7457&animate=true&t=500.00&options=false"></iframe>
  </div>
  <div id="windy" class="map-container">
    <iframe src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=mm&metricTemp=°C&metricWind=bft&zoom=6&overlay=radar&product=radar&level=surface&lat=-27.606&lon=-49.922&pressure=true&message=true"></iframe>
  </div>
  <div id="earth" class="map-container">
    <iframe data-src="https://earth.nullschool.net/#current/wind/surface/level/overlay=precip_3hr/orthographic=-51.01,-28.00,2456"></iframe>
  </div>
  <div id="meteoblue" class="map-container">
    <iframe src="https://www.meteoblue.com/pt/tempo/mapas/widget/?windAnimation=0&gust=0&satellite=0&cloudsAndPrecipitation=1&temperature=0&sunshine=0&extremeForecastIndex=0&geoloc=detect&tempunit=C&lengthunit=metric&windunit=bft&zoom=5&autowidth=auto&user_key=a3e7dbaab04f15e8&embed_key=f8b96d8d51947f3d&sig=8b9098048acd8f51fd0fb03ec7430d4008ce0555ccd923a801f32c5594262e91" scrolling="NO"></iframe>
    <a href="https://www.meteoblue.com/pt/tempo/semana/index" target="_blank" class="credits">meteoblue</a>
  </div>
  <div id="ventusky" class="map-container">
    <iframe src="https://embed.ventusky.com/?p=-27.6;-51.3;5&l=radar&m=worad_hres&w=fast"></iframe>
  </div>
  <nav>
    <button class="tab-button active" onclick="switchMap('dsat')">
      🛰️
    </button>
    <button class="tab-button" onclick="switchMap('windy')">
      📡
    </button>
    <button class="tab-button" onclick="switchMap('earth')">
      🕒
    </button>
    <button class="tab-button" onclick="switchMap('meteoblue')">
      🗓️
    </button>
    <button class="tab-button" onclick="switchMap('ventusky')">
      🤖
    </button>
  </nav>
</body>
</html>
