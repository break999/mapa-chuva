<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Olha a Chuva</title>
  <link rel="manifest" href="manifest.json">
  <script>
    navigator.serviceWorker?.register('sw.js').catch(err =>
      console.error('Service Worker error:', err)
    );
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      height: 100%;
      font-family: sans-serif;
      background: #000;
      overflow: hidden;
    }
    #tooltip {
      display: none;
      position: fixed;
      bottom: 60px;
      left: 5vw;
      right: 5vw;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 18px;
      white-space: pre-wrap;
      pointer-events: none;
      z-index: 999;
    }
    #map-wrapper {
      position: relative;
      width: 100%;
      height: calc(100vh - 48px);
    }
    .map-container {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .map-container.active {
      z-index: 1;
      pointer-events: auto;
    }
    nav {
      height: 48px;
      background: #1a1a1a;
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top: 1px solid #333;
    }
    .tab-button {
      flex: 1;
      height: 100%;
      border: none;
      background: none;
      color: #888;
      font-size: 12px;
      cursor: pointer;
      transition: color .3s, background .3s;
      user-select: none;
      -webkit-user-select: none;
    }
    .tab-button.active {
      color: #00aaff;
      border-top: 3px solid #00aaff;
      background: #252525;
    }
    .credits {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(255,255,255,.7);
      padding: 2px 5px;
      font-size: 10px;
      border-radius: 3px;
      text-decoration: none;
      color: #000;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
<div id="tooltip"></div>
<div id="map-wrapper">
  <div id="dsat" class="map-container active">
    <iframe src="https://www.cptec.inpe.br/dsat/?product=true_color_ch13_dsa&product_opacity=1&zoom=4&x=3805.5131&y=4126.9628&overlay=ch13_cpt_DSA&overlay_opacity=0.4&t=250.00&options=false"></iframe>
  </div>
  <div id="dsat-wv" class="map-container">
    <iframe src="https://www.cptec.inpe.br/dsat/?product=simple_wv&product_opacity=1&zoom=4&x=3805.5131&y=4126.9628&t=250.00&options=false"></iframe>
  </div>
  <div id="dsat-am" class="map-container">
    <iframe src="https://www.cptec.inpe.br/dsat/?product=airmass&product_opacity=1&zoom=4&x=3805.5131&y=4126.9628&t=250.00&options=false"></iframe>
  </div>
  <div id="ventusky-850" class="map-container">
    <iframe src="https://embed.ventusky.com/?p=-27.6;-51.6;4&l=wind-850hpa&w=0AAjA9Aza"></iframe>
  </div>
  <div id="ventusky-500" class="map-container">
    <iframe src="https://embed.ventusky.com/?p=-27.6;-51.6;4&l=wind-500hpa&w=0AAjA9Aza"></iframe>
  </div>
  <div id="meteoblue" class="map-container">
    <iframe src="https://www.meteoblue.com/pt/tempo/mapas/widget/-27.6N-51.6E755_America%2FSao_Paulo?windAnimation=0&gust=0&satellite=0&cloudsAndPrecipitation=1&temperature=0&sunshine=0&extremeForecastIndex=0&geoloc=fixed&tempunit=C&lengthunit=metric&windunit=bft&zoom=4&autowidth=auto&user_key=a3e7dbaab04f15e8&embed_key=f8b96d8d51947f3d&sig=8b9098048acd8f51fd0fb03ec7430d4008ce0555ccd923a801f32c5594262e91" scrolling="no"></iframe>
    <a href="https://www.meteoblue.com/pt/tempo/semana/index" target="_blank" class="credits">meteoblue</a>
  </div>
</div>
<nav id="tab-nav">
  <button class="tab-button active" data-map="dsat" data-tooltip="satélite e infravermelho">🛰️</button>
  <button class="tab-button" data-map="dsat-wv" data-tooltip="satélite - Simple Water Vapor (ch 13+10+08)
    &#10;🖤 seco em todas as camadas
    &#10;❤️ nuvem na camada baixa, atmosfera seca
    &#10;♓ nuvem na camada baixa, umidade na camada baixa, seco na camada alta
    &#10;🩷 nuvem na camada baixa, umidade em todas as camadas
    &#10;💙 umidade na camada baixa, seco na camada alta
    &#10;💚 umidade na camada alta, seco na camada baixa
    &#10;🩵 umidade em todas as camadas, sem nuvens
    &#10;🤍 iniciação de convecção ou nuvem comprida verticalmente
    &#10;
    &#10;🖤❤️♓🩷 💙💚🩵🤍
    &#10;☀️☀️☀️💧 ☀️💧💧🌧️
    &#10;☀️☁️🌧️🌧️ 💧☀️💧🌧️">💧</button>
  <button class="tab-button" data-map="dsat-am" data-tooltip="satélite - Air Mass">💨</button>
  <button class="tab-button" data-map="ventusky-850" data-tooltip="pressão e vento na camada baixa">👇</button>
  <button class="tab-button" data-map="ventusky-500" data-tooltip="pressão e vento na camada alta">☝️</button>
  <button class="tab-button" data-map="meteoblue" data-tooltip="previsão do tempo - nuvem e chuva">🗓️</button>
</nav>
<script>
  const tooltip = document.getElementById('tooltip');
  const nav = document.getElementById('tab-nav');

  let activeMap = document.getElementById('dsat');
  let activeBtn = document.querySelector('.tab-button.active');

  nav.addEventListener('click', e => {
    const btn = e.target.closest('.tab-button');
    if (!btn || btn === activeBtn) return;

    activeMap.classList.remove('active');
    activeBtn.classList.remove('active');

    activeMap = document.getElementById(btn.dataset.map);
    activeBtn = btn;

    activeMap.classList.add('active');
    activeBtn.classList.add('active');
  });

  let pressTimer = null;

  nav.addEventListener('touchstart', e => {
    const btn = e.target.closest('.tab-button');
    if (!btn) return;

    pressTimer = setTimeout(() => {
      tooltip.textContent = btn.dataset.tooltip;
      tooltip.style.display = 'block';
      pressTimer = null;
    }, 300);
  }, { passive: true });

  const hideTooltip = () => {
    clearTimeout(pressTimer);
    pressTimer = null;
    tooltip.style.display = 'none';
  };

  nav.addEventListener('touchend', hideTooltip);
  nav.addEventListener('touchcancel', hideTooltip);
  nav.addEventListener('touchmove', hideTooltip);
</script>
</body>
</html>
