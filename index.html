<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Olha a Chuva</title>
  <link rel="manifest" href="manifest.json">
  <script>
    navigator.serviceWorker?.register('sw.js').catch(err =>
      console.error('Service Worker error:', err)
    );
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      height: 100%;
      font-family: sans-serif;
      background: #000;
      overflow: hidden;
    }
    #tooltip {
      display: none;
      position: fixed;
      bottom: 60px;
      left: 5vw;
      right: 5vw;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      white-space: pre-wrap;
      pointer-events: none;
      z-index: 999;
    }
    #map-wrapper {
      position: relative;
      width: 100%;
      height: calc(100vh - 48px);
    }
    .map-container {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .map-container.active {
      z-index: 1;
      pointer-events: auto;
    }
    nav {
      height: 48px;
      background: #1a1a1a;
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top: 1px solid #333;
    }
    .tab-button {
      flex: 1;
      height: 100%;
      border: none;
      background: none;
      color: #888;
      font-size: 12px;
      cursor: pointer;
      transition: color .3s, background .3s;
      user-select: none;
      -webkit-user-select: none;
    }
    .tab-button.active {
      color: #00aaff;
      border-top: 3px solid #00aaff;
      background: #252525;
    }
    .credits {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(255,255,255,.7);
      padding: 2px 5px;
      font-size: 10px;
      border-radius: 3px;
      text-decoration: none;
      color: #000;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
<div id="tooltip"></div>
<div id="map-wrapper">
  <div id="dsat" class="map-container active">
    <iframe src="https://www.cptec.inpe.br/dsat/?product=ch09_cpt_WVCOLOR35&product_opacity=1&zoom=4&x=3805.5131&y=4126.9628&animate=true&t=250.00&options=false"></iframe>
  </div>
  <div id="dsat-cp" class="map-container">
    <iframe src="https://www.cptec.inpe.br/dsat/?product=cloud_phase_eumetsat&product_opacity=1&zoom=4&x=3805.5131&y=4126.9628&animate=false&t=250.00&options=false"></iframe>
  </div>
  <div id="dsat-nm" class="map-container">
    <iframe src="https://www.cptec.inpe.br/dsat/?product=night_microphysics&product_opacity=1&zoom=4&x=3805.5131&y=4126.9628&animate=false&t=250.00&options=false"></iframe>
  </div>
  <div id="meteoblue" class="map-container">
    <iframe src="https://www.meteoblue.com/pt/tempo/mapas/widget/-27.6N-51.6E755_America%2FSao_Paulo?windAnimation=0&gust=0&satellite=0&cloudsAndPrecipitation=1&temperature=0&sunshine=0&extremeForecastIndex=0&geoloc=fixed&tempunit=C&lengthunit=metric&windunit=bft&zoom=4&autowidth=auto&user_key=a3e7dbaab04f15e8&embed_key=f8b96d8d51947f3d&sig=8b9098048acd8f51fd0fb03ec7430d4008ce0555ccd923a801f32c5594262e91" scrolling="no"></iframe>
    <a href="https://www.meteoblue.com/pt/tempo/semana/index" target="_blank" class="credits">meteoblue</a>
  </div>
</div>
<nav id="tab-nav">
  <button class="tab-button active" data-map="dsat" data-tooltip="satélite - umidade na camada alta (500 hPa)">🛰️</button>
  <button class="tab-button" data-map="dsat-cp" data-tooltip="
satélite - fase da nuvem e microfísica durante o dia
&#10
&#10♐ = nuvem mais espessa (☁️) do que fina (⛅)
&#10♈ = mais partículas de água líquida (💧) do que de gelo (❄️) na nuvem
&#10♍ = mais partículas pequenas (🔹) do que grandes (🔷) na nuvem
&#10
&#10⚫⛅⛅❄️❄️🔷🔷
&#10⚪☁️☁️💧💧🔹🔹
&#10
&#10♈♉♊♌♍♎♏⛎♐♑♒♓
&#10⛅⛅⛅⛅⛅☁️☁️☁️☁️☁️☁️☁️
&#10⛅⛅⛅⛅⛅⛅☁️☁️☁️☁️☁️⛅
&#10💧💧💧❄️❄️❄️❄️❄️❄️❄️💧💧
&#10💧💧💧💧❄️❄️❄️❄️❄️💧💧💧
&#10🔷🔹🔹🔹🔹🔹🔹🔹🔷🔷🔷🔷
&#10🔷🔷🔹🔹🔹🔹🔹🔷🔷🔷🔷🔷">🌞</button>
  <button class="tab-button" data-map="dsat-nm" data-tooltip="
satélite - fase da nuvem e microfísica durante a noite
&#10
&#10♈ = nuvem mais espessa (☁️) do que fina (⛅)
&#10♍ = mais partículas de água líquida (💧) do que de gelo (❄️) na nuvem
&#10♐ = topo de nuvem mais quente (🥵) do que frio (🥶) (em nuvens finas, pode atravessar e medir o solo; portanto, uma nuvem de gelo fina pode ser medida como quente)
&#10
&#10⚫⛅⛅❄️❄️🥶🥶
&#10⚪☁️☁️💧💧🥵🥵
&#10
&#10♈♉♊♌♍♎♏⛎♐♑♒♓
&#10☁️☁️☁️☁️⛅⛅⛅⛅⛅☁️☁️☁️
&#10☁️☁️☁️⛅⛅⛅⛅⛅⛅⛅☁️☁️
&#10❄️❄️💧💧💧💧💧❄️❄️❄️❄️❄️
&#10❄️💧💧💧💧💧💧💧❄️❄️❄️❄️
&#10🥶🥶🥶🥶🥶🥶🥵🥵🥵🥵🥵🥶
&#10🥶🥶🥶🥶🥶🥵🥵🥵🥵🥵🥵🥵">🌛</button>
  <button class="tab-button" data-map="meteoblue" data-tooltip="previsão do tempo - nuvem e chuva">🗓️</button>
</nav>
<script>
  const tooltip = document.getElementById('tooltip');
  const nav = document.getElementById('tab-nav');

  let activeMap = document.getElementById('dsat');
  let activeBtn = document.querySelector('.tab-button.active');

  nav.addEventListener('click', e => {
    const btn = e.target.closest('.tab-button');
    if (!btn || btn === activeBtn) return;

    activeMap.classList.remove('active');
    activeBtn.classList.remove('active');

    activeMap = document.getElementById(btn.dataset.map);
    activeBtn = btn;

    activeMap.classList.add('active');
    activeBtn.classList.add('active');
  });

  let pressTimer = null;

  nav.addEventListener('touchstart', e => {
    const btn = e.target.closest('.tab-button');
    if (!btn) return;

    pressTimer = setTimeout(() => {
      tooltip.textContent = btn.dataset.tooltip;
      tooltip.style.display = 'block';
      pressTimer = null;
    }, 300);
  }, { passive: true });

  const hideTooltip = () => {
    clearTimeout(pressTimer);
    pressTimer = null;
    tooltip.style.display = 'none';
  };

  nav.addEventListener('touchend', hideTooltip);
  nav.addEventListener('touchcancel', hideTooltip);
  nav.addEventListener('touchmove', hideTooltip);
</script>
</body>
</html>
